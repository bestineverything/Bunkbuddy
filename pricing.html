<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - BunkBuddy</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/89/three.min.js"></script>
    <style>
        :root {
            --bg-base: #0c0c10;
            --bg-surface: #101014;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #2563eb;
            --border-color: rgba(255, 255, 255, 0.08);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-head: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.7;
            margin: 0;
            padding: 0;
            zoom: 1.25;
            overflow-x: hidden;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            z-index: 100;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
        }
        
        .solid-btn {
            cursor: pointer;
        }
        .solid-btn:hover {
            transform: scale(1.02);
        }

    </style>
</head>
<body>
    
    <!-- Use same WebGL code from app.js basically -->
    <div id="proWebGL" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; mix-blend-mode: screen; opacity: 1.0;"></div>

    <a href="app.html" class="back-link"><i class="ph ph-arrow-left"></i> Back to Dashboard</a>
        
    <div
    style="position: relative; overflow: hidden; padding-top: 100px; padding-bottom: 100px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; z-index: 10;">

    <h1
      style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 3.5rem; margin-bottom: 60px; line-height: 1.1; font-weight: 800; color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;">
      Simple, Transparent Pricing</h1>

    <!-- Advanced Glassmorphism Pricing Card -->
    <div class="pricing-card" style="
      background: rgba(12, 12, 16, 0.85); 
      backdrop-filter: blur(40px); 
      -webkit-backdrop-filter: blur(40px); 
      border: 1px solid rgba(255, 255, 255, 0.12); 
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 50px 100px rgba(0,0,0,1), inset 0 0 40px rgba(255,255,255,0.03); 
      padding: 55px 45px; 
      border-radius: 28px; 
      max-width: 420px;
      width: 100%;
      text-align: center;
    ">

      <h2
        style="font-size: 2.2rem; margin: 0 0 5px 0; font-family: var(--font-mono); font-weight: 800; background: linear-gradient(to right, #fff, #cbd5e1); -webkit-background-clip: text; background-clip: text; color: transparent;">
        PRO</h2>
      <p style="color: #94a3b8; font-size: 1.05rem; margin-bottom: 30px;">For students aiming for full
        automation
      </p>

      <div
        style="margin-bottom: 35px; display: flex; align-items: baseline; justify-content: center; gap: 8px;">
        <span style="font-size: 4.5rem; font-weight: 900; color: #fff; line-height: 1;">₹99</span>
        <span style="color: #64748b; font-size: 1.2rem; font-weight: 600;">/ month</span>
      </div>

      <button class="solid-btn" onclick="alert('Proceed to Razorpay Secure Checkout...')"
        style="width: 100%; border-radius: 99px; padding: 18px 24px; margin-bottom: 35px; transition: all 0.3s ease; font-size: 1.15rem; font-weight: 700; background: #ffffff; color: #000000; border: none; letter-spacing: 0.5px; box-shadow: 0 8px 25px rgba(255,255,255,0.15);">
        Get BunkBuddy PRO
      </button>

      <div style="text-align: left;">
        <h4
          style="color: #f1f5f9; font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--font-mono);">
          Features</h4>
        <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.95rem; color: #cbd5e1;">
          <li style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
            <i class="ph-fill ph-check-circle" style="color: #fff; font-size: 1.2rem;"></i> Push Notifications directly to WhatsApp
          </li>
          <li style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
            <i class="ph-fill ph-check-circle" style="color: #fff; font-size: 1.2rem;"></i> Unrestricted Analytics Access
          </li>
          <li style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
            <i class="ph-fill ph-check-circle" style="color: #fff; font-size: 1.2rem;"></i> Machine Learning Predictions
          </li>
          <li style="display: flex; align-items: center; gap: 12px;">
            <i class="ph-fill ph-check-circle" style="color: #fff; font-size: 1.2rem;"></i> 24/7 Priority Support
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('proWebGL');

    const camera = new THREE.Camera();
    camera.position.z = 1;
    const scene = new THREE.Scene();
    const geometry = new THREE.PlaneBufferGeometry(2, 2);

    const uniforms = {
        time: { type: "f", value: 1.0 },
        resolution: { type: "v2", value: new THREE.Vector2() },
    };

    const vertexShader = `
      void main() {
        gl_Position = vec4( position, 1.0 );
      }
    `;

    const fragmentShader = `
      precision highp float;
      uniform vec2 resolution;
      uniform float time;
        
      float random (in float x) { return fract(sin(x)*1e4); }
      float random (vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233)))* 43758.5453123); }
      
      varying vec2 vUv;

      void main(void) {
        vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
        
        // Shift epicenter UPWARDS slightly to perfectly align behind the pricing card
        uv.y -= 0.05;
        
        // Create 180 distinct vertical bands (removes horizontal chunky feel, keeps sleek streaks)
        float band = floor(uv.x * 180.0) / 180.0;
          
        float t = time*0.06 + random(band)*0.4;
        float lineWidth = 0.0015;

        vec3 color = vec3(0.0);
        // Banded X for streaks, smooth Y for perfectly anti-aliased curves (removes chunky blocks)
        vec2 streakUv = vec2(band, uv.y);
        
        for(int j = 0; j < 3; j++){
          for(int i=0; i < 4; i++){
            color[j] += lineWidth * float(i*i + 1) / abs(fract(t - 0.015*float(j) + float(i)*0.01)*1.0 - length(streakUv));        
          }
        }
        
        // Soft ambient core glow centered behind the card
        float core = 0.1 / (length(uv) + 0.1);

        gl_FragColor = vec4(color[2] + core*0.1, color[1] + core*0.2, color[0] + core*0.5, 1.0);
      }
    `;

    const material = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
    });
    scene.add(new THREE.Mesh(geometry, material));

    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    
    renderer.domElement.style.width = '100%';
    renderer.domElement.style.height = '100%';

    const onWindowResize = () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        uniforms.resolution.value.x = renderer.domElement.width;
        uniforms.resolution.value.y = renderer.domElement.height;
    };
    window.addEventListener("resize", onWindowResize, false);
    onWindowResize();

    const animate = () => {
        requestAnimationFrame(animate);
        uniforms.time.value += 0.05;
        renderer.render(scene, camera);
    };
    animate();
  </script>
</body>
</html>
