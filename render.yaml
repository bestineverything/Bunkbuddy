services:
  - type: web
    name: bunkbuddy-server
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./server/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: PYTHON
        value: python3
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    healthCheckPath: /api/health
