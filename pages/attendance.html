<span class="label">Attendance</span>
        <h1 class="hero-title"
          style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 3.2rem; margin-bottom: 10px; line-height: 1.1; font-weight: 700; color: #fff;">
          Attendance</h1>
        <p class="hero-sub">Subject-wise attendance scraped from IMS NSUT.</p>

        <div style="margin: 20px 0;">
          <button class="solid-btn" id="attendanceSyncBtn"
            style="padding: 10px 20px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;">
            <i class="ph ph-arrows-clockwise" id="syncSpinner"></i> Sync Data
          </button>
          <div id="syncProgressContainer"
            style="display: none; width: 100%; max-width: 400px; height: 6px; background: var(--bg-surface-2); border-radius: 99px; margin-top: 15px; overflow: hidden;">
            <div id="syncProgressBar"
              style="width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease;"></div>
          </div>
        </div>

        <div class="data-table-wrap" id="attendanceTable"></div>
