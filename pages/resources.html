<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
          <div>
            <span class="label">Resources</span>
            <h1 class="hero-title"
              style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 3.2rem; line-height: 1.1; font-weight: 700; color: #fff; margin:0;">
              Community Resources</h1>
          </div>

          <div
            style="display: flex; gap: 15px; align-items: center; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); padding: 10px 20px; border-radius: 99px;">
            <div style="font-size: 0.8rem; color: #38bdf8; text-transform: uppercase; font-weight: bold;">Bunk Points
            </div>
            <div id="profPoints"
              style="font-size: 1.8rem; font-weight: 900; color: #fff; font-family: var(--font-mono);">0</div>
          </div>
        </div>
        <p class="hero-sub" style="margin-bottom: 40px;">Share PDFs, links, or PYQs with your batchmates. Earn Bunk
          Points for each approved upload!</p>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;">
          <!-- Upload Form -->
          <div
            style="background: rgba(16, 16, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 20px; padding: 30px;">
            <h3 style="margin: 0 0 20px 0; font-size: 1.2rem; color: #fff;">Upload Resource</h3>
            <form id="resourceUploadForm" style="display: flex; flex-direction: column; gap: 15px;">
              <div>
                <label style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">Resource
                  Title</label>
                <input type="text" id="resTitle" class="styled-input" style="width: 100%; margin-top: 5px;"
                  placeholder="e.g. Physics Midsem PYQ" required>
              </div>
              <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                  <label
                    style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">Type</label>
                  <select id="resType" class="styled-input" style="width: 100%; margin-top: 5px;">
                    <option value="PYQ">PYQ</option>
                    <option value="PDF">PDF Notes</option>
                    <option value="LINK">Link</option>
                  </select>
                </div>
                <div style="flex: 1;">
                  <label
                    style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">Semester</label>
                  <select id="resSem" class="styled-input" style="width: 100%; margin-top: 5px;">
                    <option value="1">Sem 1</option>
                    <option value="2">Sem 2</option>
                    <option value="3">Sem 3</option>
                    <option value="4">Sem 4</option>
                    <option value="5">Sem 5</option>
                    <option value="6">Sem 6</option>
                    <option value="7">Sem 7</option>
                    <option value="8">Sem 8</option>
                  </select>
                </div>
              </div>
              <div>
                <label
                  style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">Branch</label>
                <select id="resBranch" class="styled-input" style="width: 100%; margin-top: 5px;">
                  <option value="CSE">CSE</option>
                  <option value="IT">IT</option>
                  <option value="MAC">MAC</option>
                  <option value="ECE">ECE</option>
                  <option value="ME">ME</option>
                </select>
              </div>
              <div>
                <label style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">Subject <span
                    style="text-transform:none; font-size: 0.7rem; color: var(--text-tech);">(Type custom or
                    select)</span></label>
                <input type="text" id="resSubject" list="resSubjectList" class="styled-input"
                  style="width: 100%; margin-top: 5px;" placeholder="e.g. Physics, Applied Maths..." required>
                <datalist id="resSubjectList"></datalist>
              </div>
              <div>
                <label style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">File URL /
                  Drive Link</label>
                <input type="url" id="resUrl" class="styled-input" style="width: 100%; margin-top: 5px;"
                  placeholder="https://..." required>
              </div>
              <button type="submit" class="solid-btn"
                style="margin-top: 10px; padding: 12px; background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.4); color: #38bdf8;">Submit
                for +50 Points</button>
              <div id="uploadStatus" style="font-size: 0.85rem; margin-top: 10px; color: #10b981; display: none;">Upload
                pending admin approval!</div>
            </form>
          </div>

          <!-- Feed -->
          <div
            style="background: rgba(16, 16, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 30px; display: flex; flex-direction: column;">
            <h3 style="margin: 0 0 15px 0; font-size: 1.2rem; color: #fff;">Latest Uploads</h3>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
              <select id="filterSem" class="styled-input" style="flex: 1; padding: 8px 12px; font-size: 0.85rem;">
                <option value="all">All Sems</option>
                <option value="1">Sem 1</option>
                <option value="2">Sem 2</option>
                <option value="3">Sem 3</option>
                <option value="4">Sem 4</option>
                <option value="5">Sem 5</option>
                <option value="6">Sem 6</option>
                <option value="7">Sem 7</option>
                <option value="8">Sem 8</option>
              </select>
              <select id="filterBranch" class="styled-input" style="flex: 1; padding: 8px 12px; font-size: 0.85rem;">
                <option value="all">All Branches</option>
                <option value="CSE">CSE</option>
                <option value="IT">IT</option>
                <option value="MAC">MAC</option>
                <option value="ECE">ECE</option>
                <option value="ME">ME</option>
              </select>
              <select id="filterSubject" class="styled-input" style="flex: 1.5; padding: 8px 12px; font-size: 0.85rem;">
                <option value="all">All Subjects</option>
              </select>
            </div>

            <div id="communityFeed" style="display: flex; flex-direction: column; gap: 15px; flex: 1;">
              <!-- Community Items -->
              <div class="empty-state">Loading community resources...</div>
            </div>

            <div
              style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; display: flex; align-items: center; justify-content: space-between;">
              <div style="color: var(--text-secondary); font-size: 0.9rem;">Reached 500 Points? <strong
                  style="color: #fcd34d;">Claim your free chai!</strong></div>
              <button id="claimTeaBtn" class="solid-btn"
                style="padding: 10px 20px; background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3);"
                disabled>Claim Reward</button>
            </div>
          </div>
        </div>
