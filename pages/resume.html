<!-- Resume Builder Hero -->
<div class="resume-hero">
  <div class="badge"><i class="ph ph-file-tex"></i> NSUT TnP Resume Format</div>
  <h2>Resume Builder</h2>
  <p>Build your placement-ready resume using NSUT's recommended LaTeX format. Edit the code on the left, or double-click any text on the preview to edit inline.</p>
</div>

<!-- Resume Builder Layout -->
<div class="resume-builder" id="resumeBuilder">
  <!-- Toolbar -->
  <div class="resume-toolbar">
    <div class="resume-toolbar-left">
      <div class="toolbar-title">
        <span class="dot-indicator"></span>
        resume.tex
      </div>
    </div>
    <div class="resume-toolbar-right">
      <button class="toolbar-btn" id="resumeResetBtn" title="Reset to template">
        <i class="ph ph-arrow-counter-clockwise"></i> Reset
      </button>
      <button class="toolbar-btn" id="resumeUndoBtn" title="Undo last change">
        <i class="ph ph-arrow-u-up-left"></i> Undo
      </button>
      <button class="toolbar-btn primary" id="resumeDownloadBtn" title="Download as PDF">
        <i class="ph ph-file-pdf"></i> Download PDF
      </button>
      <button class="toolbar-btn" id="downloadTexBtn" title="Download LaTeX source">
        <i class="ph ph-code"></i> Download .tex
      </button>
    </div>
  </div>

  <!-- Split Pane -->
  <div class="resume-split">
    <!-- Editor -->
    <div class="resume-editor-pane" id="editorPane">
      <div class="pane-header">
        <div class="pane-tab active" id="editorTab">
          <i class="ph ph-pencil-simple file-icon"></i> Editor
        </div>
        <div class="pane-tab" id="sourceTab">
          <i class="ph ph-code file-icon"></i> Source
        </div>
      </div>
      <div class="editor-wrapper">
        <div id="formEditorPane"></div>
        <div id="sourceEditorPane" style="display:none">
          <div class="line-numbers" id="sourceLineNumbers"></div>
          <textarea id="sourceEditor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div class="resize-gutter" id="resizeGutter"></div>

    <!-- Preview -->
    <div class="resume-preview-pane" id="previewPane">
      <div class="pane-header">
        <div class="pane-tab">
          <i class="ph ph-file-pdf file-icon"></i> Preview
        </div>
        <div class="preview-zoom-controls">
          <button class="zoom-btn" id="zoomOutBtn">−</button>
          <span class="zoom-label" id="zoomLabel">100%</span>
          <button class="zoom-btn" id="zoomInBtn">+</button>
        </div>
      </div>
      <div class="preview-scroll-area" id="previewScrollArea">
        <div class="resume-paper" id="resumePaper">
          <div id="resumePreviewContent"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="resume-status-bar">
    <div class="status-left">
      <div class="status-item"><span class="dot-green"></span> Live Preview</div>
      <div class="status-item" id="statusCharCount">0 chars</div>
    </div>
    <div class="status-right">
      <div class="status-item" id="statusCursor">Ln 1, Col 1</div>
      <div class="status-item">LaTeX</div>
    </div>
  </div>
</div>
