<span class="label">Results</span>
        <h1 class="hero-title"
          style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 3.2rem; margin-bottom: 10px; line-height: 1.1; font-weight: 700; color: #fff;">
          ResultHub Explorer</h1>
        <p class="hero-sub">Search and view result statistics for NSUT students.</p>

        <div class="filter-bar"
          style="display: flex; gap: 20px; margin-bottom: 30px; align-items: flex-end; border: 1px solid var(--border-color); padding: 20px; border-radius: var(--radius-card); background: color-mix(in srgb, var(--bg-surface-1) 80%, transparent); backdrop-filter: blur(12px);">
          <div class="input-group" style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
            <label for="rhYear"
              style="font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Academic
              Year</label>
            <select id="rhYear" class="styled-input" style="width: 100%;">
              <option value="2028">2028 (1st Year)</option>
              <option value="2027">2027 (2nd Year)</option>
              <option value="2026">2026 (3rd Year)</option>
              <option value="2025">2025 (4th Year)</option>
            </select>
          </div>
          <div class="input-group" style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
            <label for="rhBranch"
              style="font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Engineering
              Branch</label>
            <select id="rhBranch" class="styled-input" style="width: 100%;">
              <option value="all">All Branches</option>
              <option value="CSA">CSA</option>
              <option value="CSB">CSB</option>
              <option value="CSE">CSE</option>
              <option value="MAC">MAC</option>
              <option value="ECE">ECE</option>
              <option value="IT">IT</option>
              <option value="EE">EE</option>
              <option value="ME">ME</option>
            </select>
          </div>
          <button id="rhFetchBtn" class="solid-btn"
            style="height: 48px; padding: 0 2rem; display: flex; align-items: center; gap: 8px;">
            <i class="ph ph-magnifying-glass"></i> Search
          </button>
        </div>

        <div id="rhLoading" style="display: none; color: var(--text-muted);">Fetching students... this might take a
          moment.</div>
        <div id="rhResultsGrid"
          style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
          <!-- Student cards go here -->
        </div>
